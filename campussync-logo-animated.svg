<svg width="680" height="220" viewBox="0 0 680 220" xmlns="http://www.w3.org/2000/svg" role="img">
<title>CampusSync animated logo</title>
<desc>Animated CampusSync logo: icon box scales in, connection nodes pop in, lines draw, then wordmark and tagline fade in.</desc>
<defs>
<linearGradient id="iconGrad" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#4facfe"/>
<stop offset="100%" stop-color="#2f6fed"/>
</linearGradient>
<style>
.box{transform-origin:110px 110px;opacity:0;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) forwards;}
.node{opacity:0;transform-origin:center;animation:nodePop .35s ease-out forwards;}
.n1{animation-delay:.45s;transform-origin:90px 130px;}
.n2{animation-delay:.55s;transform-origin:130px 100px;}
.n3{animation-delay:.65s;transform-origin:130px 160px;}
.line{stroke-dasharray:60;stroke-dashoffset:60;opacity:0;animation:draw .4s ease-out forwards;}
.l1{animation-delay:.6s;}
.l2{animation-delay:.7s;}
.wordmark{opacity:0;transform:translateX(-12px);animation:slideFade .5s ease-out forwards;animation-delay:1s;}
.tagline{opacity:0;animation:fade .5s ease-out forwards;animation-delay:1.3s;}
@keyframes popIn{0%{opacity:0;transform:scale(.4);}100%{opacity:1;transform:scale(1);}}
@keyframes nodePop{0%{opacity:0;transform:scale(0);}100%{opacity:1;transform:scale(1);}}
@keyframes draw{0%{opacity:1;stroke-dashoffset:60;}100%{opacity:1;stroke-dashoffset:0;}}
@keyframes slideFade{0%{opacity:0;transform:translateX(-12px);}100%{opacity:1;transform:translateX(0);}}
@keyframes fade{0%{opacity:0;}100%{opacity:1;}}
</style>
</defs>
<rect x="0" y="0" width="680" height="220" rx="16" fill="#0b1220"/>
<rect class="box" x="60" y="60" width="100" height="100" rx="24" fill="url(#iconGrad)"/>
<line class="line l1" x1="90" y1="130" x2="130" y2="100" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
<line class="line l2" x1="90" y1="130" x2="130" y2="160" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
<circle class="node n1" cx="90" cy="130" r="8" fill="#ffffff"/>
<circle class="node n2" cx="130" cy="100" r="8" fill="#ffffff"/>
<circle class="node n3" cx="130" cy="160" r="8" fill="#ffffff"/>
<text class="wordmark" x="185" y="120" font-family="Arial, sans-serif" font-size="46" font-weight="700" fill="#ffffff">Campus<tspan fill="#4facfe">Sync</tspan></text>
<text class="tagline" x="187" y="152" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#8a94a6">Connect • Collaborate • Create</text>
</svg>
